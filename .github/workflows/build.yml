name: Gerar APK Android
on:
  push:
    branches: [ main, master ] # Vai rodar sempre que você der push

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checar código
        uses: actions/checkout@v3

      - name: Configurar Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Configurar Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Instalar EAS CLI
        run: npm install -g eas-cli

      - name: Instalar dependências
        run: npm install

      - name: Build Local no GitHub (Sem fila do Expo)
        run: eas build -p android --profile preview --local
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }} # (Opcional, só se o EAS exigir)

      - name: Disponibilizar APK para Download
        uses: actions/upload-artifact@v4
        with:
          name: NegaDex-APK
          path: build/*.apk
