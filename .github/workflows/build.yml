name: Gerar APK Android
on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checar código
        uses: actions/checkout@v3

      - name: Configurar Node
        uses: actions/setup-node@v3
        with:
          node-version: 20.19.4

      - name: Instalar EAS CLI
        run: npm install -g eas-cli

      - name: Instalar dependências
        run: npm install

      - name: Build no EAS (Nuvem)
        run: eas build -p android --profile preview --non-interactive --wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Baixar APK gerado
        run: |
          mkdir -p build
          eas build:download --platform android --latest --output ./build/app.apk
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Disponibilizar APK para Download
        uses: actions/upload-artifact@v4
        with:
          name: NegaDex-APK
          path: build/*.apk
